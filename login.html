<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Badminton Online</title>
    <link rel="stylesheet" href="style3.css">
    
</head>
<body class="login-body">

    <div class="navbar">
        <div class="logo">Badminton Online</div>
        <div class="nav-links">
            <a href="index.html">Home</a >
            <a href="yonex.html">Yonex</a >
            <a href="victor.html">Victor</a >
            <a href="lining.html">Li-Ning</a >
            <a href="login.html" class="active">Login</a >
        </div>
    </div>

    <div class="login-page">
        <div class="login-card">
            <h1>Welcome Back</h1>
            <p class="login-subtitle">Sign in to continue your badminton journey</p >

            <form>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <p class="login-footer">Not a member yet? Create your account soon.</p >
        </div>
    </div>

</body>
</html>
